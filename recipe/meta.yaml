{% set version = "3.16.0" %}
{% set build = 2 %}

# mpi must be defined for conda-smithy lint
{% set mpi = mpi or 'nompi' %}

# prefer nompi builds via a build number offset
{% set build = build + 100 %}  # [mpi == 'nompi']
{% set mpi_prefix = "nompi" %}  # [mpi == 'nompi']
{% set mpi_prefix = "mpi_" + mpi %}  # [mpi != 'nompi']

{% set tests_to_skip = "_not_a_real_test" %}
{% set tests_to_skip = tests_to_skip + " or test_multiprocess" %}  # [('cp313t' in str(python)) or ('cp314t' in str(python))]

# https://github.com/h5py/h5py/issues/2850
{% set tests_to_skip = tests_to_skip + " or test_ros3" %}  # [win]

{% set mpi_pytest_flag = "" %}
{% set mpi_pytest_flag = "--with-mpi" %}  # [mpi != 'nompi']

package:
  name: h5py
  version: {{ version }}

source:
  url: https://github.com/h5py/h5py/archive/{{ version }}.tar.gz
  sha256: 9c3aa5e1fc0c33ae8501a17987af2f986c8ba3ade25da66c78738a5abefea133
  patches:
    # Disable complex256 for arm64
    # follow https://github.com/conda-forge/cross-python-feedstock/issues/92
    - bad-numpy-patch.patch   # [osx and arm64]
    - 0001-Fix-ImportError-in-conda-forge-tests.patch

build:
  number: {{ build }}
  # add build string so packages can depend on
  # mpi or nompi variants
  # dependencies:
  # `pkg * mpi_mpich_*` for mpich
  # `hdf5 * mpi_*` for any mpi
  # `hdf5 * nompi_*` for no mpi
  string: {{ mpi_prefix }}_py{{ py }}h{{ PKG_HASH }}_{{ build }}
  script_env:
    - HDF5_HAS_ROS3=1  # [build_platform != target_platform]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython >=0.29.31,<4                    # [build_platform != target_platform]
    - hdf5                                   # [build_platform != target_platform]
    - hdf5 * {{ mpi_prefix }}_*              # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler("c") }}
    - {{ stdlib("c") }}
    - {{ mpi }}  # [mpi == 'openmpi' and build_platform != target_platform]
  host:
    - python
    - pip
    - setuptools
    - numpy
    - {{ mpi }}  # [mpi != 'nompi']
    - mpi4py >=3.0  # [mpi != 'nompi']
    # need to list hdf5 twice to get version pinning from conda_build_config
    # and build pinning from {{ mpi_prefix }}
    - hdf5
    - hdf5 * {{ mpi_prefix }}_*
    - cython >=0.29.31,<4
    - pkgconfig
  run:
    - python
    - cached-property
    - {{ mpi }}  # [mpi != 'nompi']
    - mpi4py >=3.0  # [mpi != 'nompi']
    # hdf5 >=1.10.4 has run_exports
    - hdf5

test:
  imports:
    - h5py
    - h5py._conv
    - h5py._errors
    - h5py._objects
    - h5py._proxy
    - h5py.defs
    - h5py.h5
    - h5py.h5a
    - h5py.h5d
    - h5py.h5f
    - h5py.h5fd
    - h5py.h5g
    - h5py.h5i
    - h5py.h5l
    - h5py.h5o
    - h5py.h5p
    - h5py.h5r
    - h5py.h5s
    - h5py.h5t
    - h5py.h5z
    - h5py.utils
  commands:
    {% set export = "export" %}   # [unix]
    {% set export = "set" %}  # [not unix]
    - {{ export }} AWS_REGION=us-east-2
    - {{ export }} OMPI_MCA_plm=isolated  # [mpi != 'nompi']
    - {{ export }} OMPI_MCA_btl_vader_single_copy_mechanism=none  # [mpi != 'nompi']
    - {{ export }} OMPI_MCA_rmaps_base_oversubscribe=yes  # [mpi != 'nompi']
    - pip check
    - python -c "import h5py; assert not h5py.get_config().mpi"  # [mpi == 'nompi']
    - python -c "import h5py; assert h5py.get_config().mpi"      # [mpi != 'nompi']
    - python -m pytest --pyargs h5py {{ mpi_pytest_flag }} -k "not ({{ tests_to_skip }})"
  requires:
    - pip
    - pytest
    - pytest-mpi

about:
  home: http://www.h5py.org/
  license: BSD-3-Clause
  license_file: licenses/license.txt
  summary: Read and write HDF5 files from Python
  dev_url: https://github.com/h5py/h5py

extra:
  recipe-maintainers:
    - jan-janssen
    - jakirkham
    - tacaswell
    - ocefpaf
    - minrk
    - scopatz
